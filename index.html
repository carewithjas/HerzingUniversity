.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:20px;animation:fadeIn .2s}.modal{background:var(--navy-mid);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;animation:su .3s}.modal-sm{max-width:420px}.modal h2{font-family:'Playfair Display',serif;font-weight:600;font-size:24px;margin-bottom:6px;background:linear-gradient(135deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.modal .modal-sub{font-size:14px;color:var(--gray);margin-bottom:24px}
.confirm-box{background:var(--navy-mid);border:1px solid var(--red-dim);border-radius:var(--radius-lg);padding:32px;width:100%;max-width:400px;text-align:center;animation:su .3s}.confirm-box h3{font-size:18px;margin-bottom:8px}.confirm-box p{font-size:14px;color:var(--gray);margin-bottom:24px}.confirm-actions{display:flex;gap:10px;justify-content:center}
.empty-state{text-align:center;padding:60px 20px;color:var(--gray)}.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:.3}.empty-state h3{font-size:18px;color:var(--white);margin-bottom:8px}.empty-state p{font-size:14px;margin-bottom:20px}.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}.section-head h2{font-family:'Playfair Display',serif;font-size:22px}.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}.filter-bar select{width:auto;min-width:160px;padding:8px 14px;font-size:13px}.filter-label{font-size:12px;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.res-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}.res-chip{display:flex;align-items:center;gap:6px;font-size:12px;background:rgba(255,255,255,.03);padding:6px 10px;border-radius:6px;cursor:pointer;color:var(--gray)}.res-chip input{accent-color:var(--gold);width:14px;height:14px}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;z-index:2000;animation:su .3s;box-shadow:0 8px 32px rgba(0,0,0,.4)}.toast-success{background:var(--green);color:var(--navy)}.toast-error{background:var(--red);color:white}
.loader-screen{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5000;transition:opacity .4s}.loader-screen.gone{opacity:0;pointer-events:none}.loader-spin{width:36px;height:36px;border:3px solid var(--navy-light);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}@keyframes spin{to{transform:rotate(360deg)}}
.verify-banner{background:var(--gold-dim);border:1px solid var(--gold);border-radius:var(--radius);padding:12px 20px;margin:0 auto 20px;max-width:1200px;font-size:13px;color:var(--gold);text-align:center;display:none}
@media(max-width:768px){.sessions-grid,.files-grid,.folder-grid{grid-template-columns:1fr}.frow{grid-template-columns:1fr}.app-nav{width:calc(100% - 48px);overflow-x:auto}.my-row,.session-list-row{flex-direction:column;align-items:flex-start}.app-header{padding:12px 16px}.disc-layout{grid-template-columns:1fr}.disc-sidebar{position:static}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--navy-light);border-radius:3px}
</style>
</head>
<body>
<div class="glow-orb g1"></div><div class="glow-orb g2"></div>
<div class="loader-screen" id="loader"><div class="loader-spin"></div><p style="color:var(--gray);font-size:13px">Loading...</p></div>
<div class="screen active" id="welcome"><div class="w-logo">H</div><div class="w-title">Welcome to <span>Herzing University's</span> Study Hub</div><div class="w-sub">A shared space to organize study sessions, share materials, and prep for exams together.</div><div class="w-badge">Built by Students, for Students</div><div class="w-actions"><button class="btn btn-primary" onclick="goAuth('signup')">Get Started</button><button class="btn btn-secondary" onclick="goAuth('login')">I Have an Account</button></div></div>
<div class="screen" id="authScreen"><div class="auth-card" id="authCard"></div></div>
<div class="screen" id="mainApp">
  <header class="app-header"><div class="logo-area"><div class="logo-mark">H</div><div style="display:flex;flex-direction:column"><span class="logo-text">Study Hub</span><span class="logo-sub">Herzing University</span></div></div><div class="header-right"><div class="online-badge"><div class="online-dot"></div><span id="onlineCount">0</span> online</div><span class="user-badge" id="userBadge" onclick="openProfileModal()"></span><span class="admin-badge" id="adminBadge" style="display:none">Admin</span><button class="btn btn-ghost btn-sm" onclick="auth.signOut()">Log out</button></div></header>
  <div class="verify-banner" id="verifyBanner">Please verify your email. Check your inbox for a verification link. <a style="color:var(--gold);cursor:pointer;font-weight:700" onclick="auth.currentUser.sendEmailVerification().then(()=>showToast('Verification email sent!'))">Resend</a></div>
  <nav class="app-nav" id="appNav"></nav>
  <div class="app-body" id="appBody"></div>
</div>
<script>
// ═══ CONSTANTS ═══
const COLORS=['#D4A843','#5B8DEF','#3ECF8E','#9D78FF','#FFA64D','#F06449','#E85B93','#4ECDC4'];
const PROGRAMS=[{v:'demsn',l:'DE-MSN'},{v:'bsn',l:'BSN'},{v:'adn',l:'ADN'},{v:'lpn-bsn',l:'LPN-to-BSN'},{v:'rn-bsn',l:'RN-to-BSN'},{v:'msn',l:'MSN'},{v:'dnp',l:'DNP'}];
const CLASSES={demsn:[{v:'fundamentals',l:'Fundamentals of Nursing',b:'badge-fund'},{v:'pathophysiology',l:'Pathophysiology',b:'badge-patho'},{v:'pharmacology',l:'Pharmacology',b:'badge-pharma'},{v:'health-assessment',l:'Health Assessment',b:'badge-assess'},{v:'adult-health',l:'Adult Health / Med-Surg',b:'badge-medsurg'},{v:'mental-health',l:'Mental Health Nursing',b:'badge-mental'},{v:'pediatrics',l:'Pediatric Nursing',b:'badge-peds'},{v:'ob-maternity',l:'OB/Maternity',b:'badge-ob'},{v:'community',l:'Community Health',b:'badge-other'},{v:'leadership',l:'Leadership & Management',b:'badge-other'}],bsn:[{v:'fundamentals',l:'Fundamentals',b:'badge-fund'},{v:'pathophysiology',l:'Pathophysiology',b:'badge-patho'},{v:'pharmacology',l:'Pharmacology',b:'badge-pharma'},{v:'health-assessment',l:'Health Assessment',b:'badge-assess'},{v:'adult-health',l:'Med-Surg',b:'badge-medsurg'},{v:'mental-health',l:'Mental Health',b:'badge-mental'},{v:'pediatrics',l:'Pediatrics',b:'badge-peds'},{v:'ob-maternity',l:'OB/Maternity',b:'badge-ob'}],adn:[{v:'fundamentals',l:'Fundamentals',b:'badge-fund'},{v:'pharmacology',l:'Pharmacology',b:'badge-pharma'},{v:'adult-health',l:'Med-Surg',b:'badge-medsurg'},{v:'mental-health',l:'Mental Health',b:'badge-mental'}],'lpn-bsn':[{v:'pathophysiology',l:'Pathophysiology',b:'badge-patho'},{v:'pharmacology',l:'Pharmacology',b:'badge-pharma'},{v:'adult-health',l:'Med-Surg',b:'badge-medsurg'},{v:'community',l:'Community Health',b:'badge-other'}],'rn-bsn':[{v:'community',l:'Community Health',b:'badge-other'},{v:'leadership',l:'Leadership',b:'badge-other'},{v:'research',l:'Nursing Research',b:'badge-other'}],msn:[{v:'advanced-patho',l:'Advanced Pathophysiology',b:'badge-patho'},{v:'advanced-pharm',l:'Advanced Pharmacology',b:'badge-pharma'},{v:'advanced-assess',l:'Advanced Assessment',b:'badge-assess'},{v:'leadership',l:'Leadership',b:'badge-other'}],dnp:[{v:'evidence-practice',l:'Evidence-Based Practice',b:'badge-other'},{v:'health-policy',l:'Health Policy',b:'badge-other'},{v:'leadership',l:'Organizational Leadership',b:'badge-other'}]};
const RESOURCES=['Study Fetch','Anki Decks','ATI / HESI Review','Textbook Chapters','Practice NCLEX Qs','YouTube / Osmosis','Quizlet','Group Discussion','Case Studies','Lecture Slides','Learning Games'];
const FAQS=[{q:'How does the Study Hub work?',a:'Create or join study sessions organized by program and class. Browse materials. Start or join discussions.'},{q:'Can I see sessions from other programs?',a:'Yes. By default you see all sessions. Use the program/class filters to narrow down.'},{q:'Will I get automatic reminders?',a:'Not at this time. Session leaders can see your contact preference and may reach out manually. Add the meeting link to your own calendar.'},{q:'How are study materials organized?',a:'Materials are organized in folders by program and then by class. Navigate like a file browser.'},{q:'How does discussion work?',a:'Post topics tagged by program and class. Others can reply and upvote. Think Reddit, but for studying.'},{q:'Who built this?',a:'Built by Herzing nursing students. Not affiliated with or endorsed by Herzing University administration.'}];

// ═══ STATE ═══
let CU=null,UP=null,isAdmin=false,sessions=[],materials=[],threads=[],nav='sessions',fProg='all',fClass='all',sessView='grid',matPath=[],discView='feed',discOpenId=null,discSearch='',discSort='hot',toastT=null,unsubs=[];

// ═══ HELPERS ═══
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function ini(n){return(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function col(n){let h=0;for(let i=0;i<(n||'').length;i++)h=n.charCodeAt(i)+((h<<5)-h);return COLORS[Math.abs(h)%COLORS.length]}
function fD(d){try{return new Date(d+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}catch(e){return d}}
function fT(t){try{const[h,m]=t.split(':');const hr=+h;return`${hr>12?hr-12:(hr||12)}:${m} ${hr>=12?'PM':'AM'}`}catch(e){return t}}
function isUp(s){return new Date(s.date+'T'+s.time)>=new Date()}
function gci(v){for(const p in CLASSES){const c=CLASSES[p].find(x=>x.v===v);if(c)return c}return{v,l:v,b:'badge-other'}}
function gpl(v){const p=PROGRAMS.find(x=>x.v===v);return p?p.l:v}
function timeAgo(ts){const s=Math.floor((Date.now()-new Date(ts))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'}
function showToast(m,t){document.querySelectorAll('.toast').forEach(x=>x.remove());const el=document.createElement('div');el.className='toast toast-'+(t||'success');el.textContent=m;document.body.appendChild(el);clearTimeout(toastT);toastT=setTimeout(()=>el.remove(),3000)}
function closeModal(){document.querySelectorAll('.modal-overlay').forEach(m=>m.remove())}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function updCls(id,prog){const sel=document.getElementById(id);if(!sel)return;sel.innerHTML=(CLASSES[prog]||[]).map(c=>`<option value="${c.v}">${c.l}</option>`).join('')}

// ═══ AUTH ═══
function goAuth(mode){
  showScreen('authScreen');const card=document.getElementById('authCard');
  if(mode==='login')card.innerHTML=`<h2>Welcome Back</h2><p class="sub">Sign in to your Study Hub account.</p><div class="fg"><label>Email</label><input id="a-email" placeholder="you@herzing.edu"></div><div class="fg"><label>Password</label><input type="password" id="a-pass" placeholder="Password"></div><span class="forgot-link" onclick="goAuth('forgot')">Forgot password?</span><div class="auth-err" id="authErr"></div><button class="btn btn-primary btn-full" onclick="doLogin()">Sign In</button><div class="auth-toggle">Don't have an account? <a onclick="goAuth('signup')">Sign up</a></div>`;
  else if(mode==='signup')card.innerHTML=`<h2>Create Account</h2><p class="sub">Join the community.</p><div class="fg"><label>Full Name</label><input id="a-name" placeholder="e.g. Jas Thompson"></div><div class="fg"><label>Email</label><input id="a-email" placeholder="you@herzing.edu"></div><div class="frow"><div class="fg"><label>Password</label><input type="password" id="a-pass" placeholder="Min 6 chars"></div><div class="fg"><label>Confirm</label><input type="password" id="a-pass2" placeholder="Confirm"></div></div><div class="fg"><label>Program</label><select id="a-prog">${PROGRAMS.map(p=>`<option value="${p.v}">${p.l}</option>`).join('')}</select></div><div class="auth-err" id="authErr"></div><button class="btn btn-primary btn-full" onclick="doSignup()">Create Account</button><div class="auth-toggle">Have an account? <a onclick="goAuth('login')">Sign in</a></div>`;
  else card.innerHTML=`<h2>Reset Password</h2><p class="sub">We'll send a reset link.</p><div class="fg"><label>Email</label><input id="a-email" placeholder="you@herzing.edu"></div><div class="auth-err" id="authErr"></div><button class="btn btn-primary btn-full" onclick="doForgot()">Send Reset Link</button><div class="auth-toggle"><a onclick="goAuth('login')">Back to sign in</a></div>`;
}
function authErr(m){const el=document.getElementById('authErr');if(el){el.textContent=m;el.classList.add('show')}}
async function doLogin(){const email=(document.getElementById('a-email')?.value||'').trim(),pass=document.getElementById('a-pass')?.value||'';if(!email||!pass){authErr('Enter email and password.');return}try{await auth.signInWithEmailAndPassword(email,pass)}catch(e){authErr(e.message.replace('Firebase:','').trim())}}
async function doSignup(){const name=(document.getElementById('a-name')?.value||'').trim(),email=(document.getElementById('a-email')?.value||'').trim(),pass=document.getElementById('a-pass')?.value||'',pass2=document.getElementById('a-pass2')?.value||'',prog=document.getElementById('a-prog')?.value||'demsn';if(!name||!email||!pass){authErr('All fields required.');return}if(pass!==pass2){authErr('Passwords do not match.');return}if(pass.length<6){authErr('Min 6 characters.');return}try{const cred=await auth.createUserWithEmailAndPassword(email,pass);await cred.user.updateProfile({displayName:name});await cred.user.sendEmailVerification();await db.collection('users').doc(cred.user.uid).set({name,email,program:prog,createdAt:new Date().toISOString()});showToast('Account created! Check email to verify.')}catch(e){authErr(e.message.replace('Firebase:','').trim())}}
async function doForgot(){const email=(document.getElementById('a-email')?.value||'').trim();if(!email){authErr('Enter your email.');return}try{await auth.sendPasswordResetEmail(email);showToast('Reset link sent!');goAuth('login')}catch(e){authErr(e.message.replace('Firebase:','').trim())}}

// ═══ AUTH STATE + REAL-TIME LISTENERS ═══
auth.onAuthStateChanged(async user=>{
  // Cleanup old listeners
  unsubs.forEach(u=>u());unsubs=[];
  if(user){
    CU=user;isAdmin=ADMIN_EMAILS.includes(user.email?.toLowerCase());
    // Load user profile
    try{const doc=await db.collection('users').doc(user.uid).get();UP=doc.exists?doc.data():{name:user.displayName||'',program:'demsn'}}catch(e){UP={name:user.displayName||'',program:'demsn'}}
    showScreen('mainApp');
    document.getElementById('userBadge').innerHTML=`Hi, <span>${esc((user.displayName||user.email).split(' ')[0])}</span>`;
    document.getElementById('adminBadge').style.display=isAdmin?'inline-block':'none';
    document.getElementById('verifyBanner').style.display=user.emailVerified?'none':'block';
    setupPresence(user);
    setupListeners();
    nav='sessions';renderApp();
    document.getElementById('loader').classList.add('gone');
  } else {
    CU=null;UP=null;isAdmin=false;
    showScreen('welcome');
    document.getElementById('loader').classList.add('gone');
  }
});

function setupPresence(user){
  const ref=rtdb.ref('presence/'+user.uid);
  ref.set({name:user.displayName||user.email,online:true,ts:firebase.database.ServerValue.TIMESTAMP});
  ref.onDisconnect().set({name:user.displayName||user.email,online:false,ts:firebase.database.ServerValue.TIMESTAMP});
  rtdb.ref('presence').on('value',snap=>{let c=0;snap.forEach(ch=>{if(ch.val().online)c++});const el=document.getElementById('onlineCount');if(el)el.textContent=c});
}

function setupListeners(){
  // Sessions - real-time
  unsubs.push(db.collection('sessions').orderBy('createdAt','desc').onSnapshot(snap=>{
    sessions=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(nav==='sessions'||nav==='my')renderPage();
  },e=>console.error('Sessions listener:',e)));
  // Threads - real-time
  unsubs.push(db.collection('threads').orderBy('ts','desc').onSnapshot(snap=>{
    threads=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(nav==='discussion')renderPage();
  },e=>console.error('Threads listener:',e)));
  // Materials - real-time
  unsubs.push(db.collection('materials').orderBy('uploadedAt','desc').onSnapshot(snap=>{
    materials=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(nav==='materials')renderPage();
  },e=>console.error('Materials listener:',e)));
}

// ═══ NAV + RENDER ═══
function renderApp(){
  const items=[{id:'sessions',l:'Sessions',i:'📅'},{id:'my',l:'My Sessions',i:'👤'},{id:'materials',l:'Materials',i:'📁'},{id:'discussion',l:'Discussion',i:'💬'},{id:'faq',l:'FAQ',i:'❓'}];
  if(isAdmin)items.push({id:'admin',l:'Admin',i:'⚙️'});
  document.getElementById('appNav').innerHTML=items.map(n=>`<button class="nav-btn ${nav===n.id?'active':''}" onclick="goNav('${n.id}')">${n.i} ${n.l}</button>`).join('');
  renderPage();
}
function goNav(id){nav=id;if(id==='materials')matPath=[];if(id==='discussion'){discView='feed';discOpenId=null;discSearch=''}renderApp()}
function renderPage(){const b=document.getElementById('appBody');({sessions:rSess,my:rMy,materials:rMats,discussion:rDisc,faq:rFAQ,admin:rAdmin})[nav]?.(b)}

// ═══ SESSIONS ═══
function rSess(el){
  const up=sessions.filter(isUp).sort((a,b)=>new Date(a.date+'T'+a.time)-new Date(b.date+'T'+b.time));
  let list=up;if(fProg!=='all')list=list.filter(s=>s.program===fProg);if(fClass!=='all')list=list.filter(s=>s.classType===fClass);
  const co=fProg!=='all'&&CLASSES[fProg]?CLASSES[fProg]:[];
  el.innerHTML=`<div class="section-head"><h2>Study Sessions</h2><div style="display:flex;gap:8px;align-items:center"><div class="view-toggle"><button class="vt-btn ${sessView==='grid'?'active':''}" onclick="sessView='grid';renderPage()">▦</button><button class="vt-btn ${sessView==='list'?'active':''}" onclick="sessView='list';renderPage()">☰</button></div><button class="btn btn-primary btn-sm" onclick="openCreateModal()">+ Host a Session</button></div></div>
    <div class="filter-bar"><span class="filter-label">Filter:</span><select onchange="fProg=this.value;fClass='all';renderPage()"><option value="all">All Programs</option>${PROGRAMS.map(p=>`<option value="${p.v}" ${fProg===p.v?'selected':''}>${p.l}</option>`).join('')}</select>${co.length?`<select onchange="fClass=this.value;renderPage()"><option value="all">All Classes</option>${co.map(c=>`<option value="${c.v}" ${fClass===c.v?'selected':''}>${c.l}</option>`).join('')}</select>`:''}<span style="font-size:12px;color:var(--gray)">${list.length} session${list.length!==1?'s':''}</span></div>
    ${list.length?(sessView==='grid'?`<div class="sessions-grid">${list.map((s,i)=>sCard(s,i)).join('')}</div>`:`<div class="sessions-list">${list.map(s=>sRow(s)).join('')}</div>`):`<div class="empty-state"><div class="icon">🎯</div><h3>No sessions found</h3><p>Try a different filter or host one.</p></div>`}`;
}
function sCard(s,idx){
  const cl=gci(s.classType),uid=CU?.uid,isL=s.leaderUid===uid,isA=(s.attendees||[]).some(a=>a.uid===uid);
  const spots=s.maxAttendees>0?` · ${Math.max(0,s.maxAttendees-(s.attendees||[]).length)} spots left`:'';
  let mL='Meeting';const ml=(s.meetLink||'').toLowerCase();if(ml.includes('zoom'))mL='Zoom';else if(ml.includes('meet.google'))mL='Google Meet';else if(ml.includes('teams'))mL='Teams';
  return`<div class="session-card card-anim" style="animation-delay:${idx*.06}s"><div class="card-header"><span class="class-badge ${cl.b}">${cl.l}</span><span class="date-badge">${fD(s.date)}</span></div><div class="program-tag">${gpl(s.program)}</div><h3>${esc(s.topic)}</h3><div class="leader"><em>Led by</em> ${esc(s.leader)}${isL?' (you)':''}</div><div class="meta-row"><span class="meta-tag">🕐 ${fT(s.time)}${s.duration?' · '+s.duration+' min':''}</span>${s.location?`<span class="meta-tag">📍 ${esc(s.location)}</span>`:''}</div>${s.resources?.length?`<div class="meta-row">${s.resources.map(r=>`<span class="meta-tag">📄 ${esc(r)}</span>`).join('')}</div>`:''}${s.description?`<div class="desc">${esc(s.description).substring(0,160)}${s.description.length>160?'...':''}</div>`:''}<div class="card-footer"><div class="attendees"><div class="attendee-dots"><div class="attendee-dot" style="background:${col(s.leader)};z-index:10">${ini(s.leader)}</div>${(s.attendees||[]).slice(0,4).map((a,i)=>`<div class="attendee-dot" style="background:${col(a.name)};z-index:${9-i}">${ini(a.name)}</div>`).join('')}${(s.attendees||[]).length>4?`<div class="attendee-dot" style="background:var(--navy-light)">+${(s.attendees||[]).length-4}</div>`:''}</div><span>${(s.attendees||[]).length+1} studying${spots}</span></div><div style="display:flex;gap:6px">${isL||isA?`<button class="btn btn-attend joined">✓ Joined</button>`:`<button class="btn btn-attend" onclick="joinSess('${s.id}')">Join</button>`}</div></div>${s.meetLink?`<div class="cal-link"><a href="${esc(s.meetLink)}" target="_blank">🔗 ${mL}</a></div>`:''}</div>`;
}
function sRow(s){
  const cl=gci(s.classType),uid=CU?.uid,isL=s.leaderUid===uid,isA=(s.attendees||[]).some(a=>a.uid===uid);

// ═══ DISCUSSION ═══
function rDisc(el){
  if(discView==='detail'&&discOpenId){rThreadDetail(el);return}
  const progCounts={};threads.forEach(t=>{progCounts[t.program]=(progCounts[t.program]||0)+1});
  let list=[...threads];if(fProg!=='all')list=list.filter(t=>t.program===fProg);if(fClass!=='all')list=list.filter(t=>t.classType===fClass);
  if(discSearch){const q=discSearch.toLowerCase();list=list.filter(t=>t.title.toLowerCase().includes(q)||t.body?.toLowerCase().includes(q)||(t.replies||[]).some(r=>r.text.toLowerCase().includes(q)))}
  if(discSort==='hot')list.sort((a,b)=>(b.votes||0)-(a.votes||0));else if(discSort==='new')list.sort((a,b)=>new Date(b.ts)-new Date(a.ts));else list.sort((a,b)=>(b.replies||[]).length-(a.replies||[]).length);
  el.innerHTML=`<div class="section-head"><h2>Discussion</h2><button class="btn btn-primary btn-sm" onclick="openThreadModal()">+ New Post</button></div>
    <div class="disc-layout"><div class="disc-feed">
      <div class="disc-search"><input placeholder="Search discussions..." value="${esc(discSearch)}" oninput="discSearch=this.value;renderPage()"><button class="btn btn-secondary btn-sm" onclick="discSearch='';renderPage()">Clear</button></div>
      <div class="disc-sort"><button class="sort-btn ${discSort==='hot'?'active':''}" onclick="discSort='hot';renderPage()">🔥 Hot</button><button class="sort-btn ${discSort==='new'?'active':''}" onclick="discSort='new';renderPage()">🆕 New</button><button class="sort-btn ${discSort==='active'?'active':''}" onclick="discSort='active';renderPage()">💬 Active</button></div>
      ${list.length?list.map(t=>{const cl=gci(t.classType),voted=(t.votedBy||[]).includes(CU?.uid),preview=(t.body||'').substring(0,120)+(t.body?.length>120?'...':'');
        return`<div class="thread-row" onclick="discView='detail';discOpenId='${t.id}';renderPage()"><div class="tr-votes" onclick="event.stopPropagation()"><button class="tr-vote-btn ${voted?'voted':''}" onclick="event.stopPropagation();voteTh('${t.id}')">▲</button><span class="tr-vote-count">${t.votes||0}</span></div><div class="tr-main"><div class="tr-title">${esc(t.title)}</div>${preview?`<div class="tr-preview">${esc(preview)}</div>`:''}<div class="tr-meta"><span class="class-badge ${cl.b}">${cl.l}</span><span>${gpl(t.program)}</span><span style="display:flex;align-items:center;gap:3px"><span style="width:16px;height:16px;border-radius:50%;background:${col(t.author)};display:inline-grid;place-items:center;font-size:8px;font-weight:700">${ini(t.author)}</span>${esc(t.author)}</span><span>${timeAgo(t.ts)}</span><span>💬 ${(t.replies||[]).length}</span></div></div></div>`}).join(''):`<div class="empty-state"><div class="icon">💬</div><h3>${discSearch?'No results':'No posts yet'}</h3></div>`}
    </div><div class="disc-sidebar">
      <div class="sub-card"><h4>Programs</h4><div class="sub-item ${fProg==='all'?'active':''}" onclick="fProg='all';fClass='all';renderPage()">All Programs <span class="sub-count">${threads.length}</span></div>${PROGRAMS.filter(p=>progCounts[p.v]).map(p=>`<div class="sub-item ${fProg===p.v?'active':''}" onclick="fProg='${p.v}';fClass='all';renderPage()">${p.l} <span class="sub-count">${progCounts[p.v]||0}</span></div>`).join('')}</div>
      ${fProg!=='all'?`<div class="sub-card"><h4>Classes</h4><div class="sub-item ${fClass==='all'?'active':''}" onclick="fClass='all';renderPage()">All</div>${(CLASSES[fProg]||[]).filter(c=>threads.some(t=>t.program===fProg&&t.classType===c.v)).map(c=>{const cnt=threads.filter(t=>t.program===fProg&&t.classType===c.v).length;return`<div class="sub-item ${fClass===c.v?'active':''}" onclick="fClass='${c.v}';renderPage()">${c.l} <span class="sub-count">${cnt}</span></div>`}).join('')}</div>`:''}
    </div></div>`;
}
function rThreadDetail(el){
  const t=threads.find(x=>x.id===discOpenId);if(!t){discView='feed';rDisc(el);return}

    <div class="td-replies-head">${(t.replies||[]).length} ${(t.replies||[]).length===1?'Reply':'Replies'}</div>

    ${(t.replies||[]).map(r=>`<div class="reply"><div class="r-avatar" style="background:${col(r.author)}">${ini(r.author)}</div><div class="r-body"><div class="r-name">${esc(r.author)}</div><div class="r-text">${esc(r.text)}</div><div class="r-time">${timeAgo(r.ts)}${isAdmin&&r.uid!==CU?.uid?` · <span style="color:var(--red);cursor:pointer" onclick="delReply('${t.id}','${r.id}')">Remove</span>`:''}</div></div></div>`).join('')}
    ${!(t.replies||[]).length?'<div style="text-align:center;padding:20px;color:var(--gray-dark);font-size:13px">No replies yet.</div>':''}</div>`;
}

// ═══ FIREBASE WRITE OPS ═══
async function joinSess(id){
  const s=sessions.find(x=>x.id===id);if(!s||!CU)return;
  if(s.maxAttendees>0&&(s.attendees||[]).length>=s.maxAttendees){showToast('Session is full!','error');return}
  const att={name:CU.displayName||CU.email,uid:CU.uid,email:CU.email,joinedAt:new Date().toISOString()};
  try{await db.collection('sessions').doc(id).update({attendees:firebase.firestore.FieldValue.arrayUnion(att)});showToast(`Joined "${s.topic}"!`)}catch(e){showToast('Failed to join.','error');console.error(e)}
}
async function delSess(id){try{await db.collection('sessions').doc(id).delete();showToast('Session deleted.')}catch(e){showToast('Failed.','error')}}
async function leaveSess(id){
  const s=sessions.find(x=>x.id===id);if(!s||!CU)return;
  const updated=(s.attendees||[]).filter(a=>a.uid!==CU.uid);
  try{await db.collection('sessions').doc(id).update({attendees:updated});showToast('You left.')}catch(e){showToast('Failed.','error')}
}
async function voteTh(id){
  const t=threads.find(x=>x.id===id);if(!t||!CU)return;
  const voted=(t.votedBy||[]).includes(CU.uid);
  try{await db.collection('threads').doc(id).update({votes:firebase.firestore.FieldValue.increment(voted?-1:1),votedBy:voted?firebase.firestore.FieldValue.arrayRemove(CU.uid):firebase.firestore.FieldValue.arrayUnion(CU.uid)})}catch(e){showToast('Failed.','error')}
}
async function addReply(id){
  const input=document.getElementById('reply-'+id);const text=(input?.value||'').trim();if(!text||!CU)return;
  const reply={id:'r'+genId(),author:CU.displayName||CU.email,uid:CU.uid,text,ts:new Date().toISOString()};
  try{await db.collection('threads').doc(id).update({replies:firebase.firestore.FieldValue.arrayUnion(reply)});if(input)input.value='';showToast('Reply posted!')}catch(e){showToast('Failed.','error')}
}
async function delThread(id){try{await db.collection('threads').doc(id).delete();discView='feed';discOpenId=null;showToast('Thread removed.')}catch(e){showToast('Failed.','error')}}
async function delReply(threadId,replyId){
  const t=threads.find(x=>x.id===threadId);if(!t)return;
  const updated=(t.replies||[]).filter(r=>r.id!==replyId);
  try{await db.collection('threads').doc(threadId).update({replies:updated});showToast('Reply removed.')}catch(e){showToast('Failed.','error')}
}
async function delMat(id,path){
  try{await db.collection('materials').doc(id).delete();if(path)try{await stg.ref(path).delete()}catch(e){}showToast('Material deleted.')}catch(e){showToast('Failed.','error')}
}

  o.innerHTML=`<div class="modal modal-sm"><h2>Edit Profile</h2><div class="fg"><label>Name</label><input id="pf-name" value="${esc(CU.displayName||'')}"></div><div class="fg"><label>Program</label><select id="pf-prog">${PROGRAMS.map(p=>`<option value="${p.v}" ${p.v===UP?.program?'selected':''}>${p.l}</option>`).join('')}</select></div><div class="form-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveProfile()">Save</button></div></div>`;

async function doCreate(){let ok=true;const t=document.getElementById('cr-topic').value.trim(),d=document.getElementById('cr-date').value,ti=document.getElementById('cr-time').value,l=document.getElementById('cr-link').value.trim();
  if(!t){document.getElementById('cr-topic').classList.add('field-err');document.getElementById('err-cr-topic').classList.add('show');ok=false}if(!d){document.getElementById('cr-date').classList.add('field-err');document.getElementById('err-cr-date').classList.add('show');ok=false}if(!ti){document.getElementById('cr-time').classList.add('field-err');document.getElementById('err-cr-time').classList.add('show');ok=false}if(!l){document.getElementById('cr-link').classList.add('field-err');document.getElementById('err-cr-link').classList.add('show');ok=false}if(!ok)return;
  try{await db.collection('sessions').add({topic:t,program:document.getElementById('cr-prog').value,classType:document.getElementById('cr-cls').value,date:d,time:ti,duration:document.getElementById('cr-dur').value,location:document.getElementById('cr-loc').value.trim(),meetLink:l,description:document.getElementById('cr-desc').value.trim(),maxAttendees:+document.getElementById('cr-max').value,resources:[...document.querySelectorAll('.res-chk:checked')].map(c=>c.value),leader:CU.displayName||CU.email,leaderUid:CU.uid,attendees:[],createdAt:new Date().toISOString()});closeModal();showToast('Session created!')}catch(e){showToast('Failed to create.','error');console.error(e)}}

    <div class="frow"><div class="fg"><label>Program</label><select id="ed-prog" onchange="updCls('ed-cls',this.value)">${PROGRAMS.map(p=>`<option value="${p.v}" ${p.v===s.program?'selected':''}>${p.l}</option>`).join('')}</select></div><div class="fg"><label>Class</label><select id="ed-cls"></select></div></div>
    <div class="frow"><div class="fg"><label>Date *</label><input type="date" id="ed-date" value="${s.date}"><div class="err-text" id="err-ed-date">Required</div></div><div class="fg"><label>Time *</label><input type="time" id="ed-time" value="${s.time}"><div class="err-text" id="err-ed-time">Required</div></div></div>
    <div class="frow"><div class="fg"><label>Duration</label><select id="ed-dur">${['60','90','120','180'].map(x=>`<option value="${x}" ${x===s.duration?'selected':''}>${x==='120'?'2 hrs':x==='180'?'3 hrs':x+' min'}</option>`).join('')}</select></div><div class="fg"><label>Location</label><input id="ed-loc" value="${esc(s.location||'')}"></div></div>
    <div class="fg"><label>Resources</label><div class="res-grid">${RESOURCES.map(r=>`<label class="res-chip"><input type="checkbox" class="rce" value="${r}" ${(s.resources||[]).includes(r)?'checked':''}> ${r}</label>`).join('')}</div></div>
    <div class="fg"><label>Meeting Link *</label><input id="ed-link" value="${esc(s.meetLink||'')}"><div class="err-text" id="err-ed-link">Required</div></div>
    <div class="fg"><label>Description</label><textarea id="ed-desc">${esc(s.description||'')}</textarea></div>
    <div class="fg"><label>Max</label><select id="ed-max">${[0,5,10,15,20,30].map(n=>`<option value="${n}" ${n===s.maxAttendees?'selected':''}>${n===0?'No limit':n}</option>`).join('')}</select></div>
    <div class="form-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="doEdit('${s.id}')">Save</button></div></div>`;
  document.body.appendChild(o);updCls('ed-cls',s.program);setTimeout(()=>{const sel=document.getElementById('ed-cls');if(sel)sel.value=s.classType},50)}

async function doEdit(id){let ok=true;const t=document.getElementById('ed-topic').value.trim(),d=document.getElementById('ed-date').value,ti=document.getElementById('ed-time').value,l=document.getElementById('ed-link').value.trim();
  if(!t){document.getElementById('ed-topic').classList.add('field-err');document.getElementById('err-ed-topic').classList.add('show');ok=false}if(!d){document.getElementById('ed-date').classList.add('field-err');document.getElementById('err-ed-date').classList.add('show');ok=false}if(!ti){document.getElementById('ed-time').classList.add('field-err');document.getElementById('err-ed-time').classList.add('show');ok=false}if(!l){document.getElementById('ed-link').classList.add('field-err');document.getElementById('err-ed-link').classList.add('show');ok=false}if(!ok)return;
  try{await db.collection('sessions').doc(id).update({topic:t,program:document.getElementById('ed-prog').value,classType:document.getElementById('ed-cls').value,date:d,time:ti,duration:document.getElementById('ed-dur').value,location:document.getElementById('ed-loc').value.trim(),meetLink:l,description:document.getElementById('ed-desc').value.trim(),maxAttendees:+document.getElementById('ed-max').value,resources:[...document.querySelectorAll('.rce:checked')].map(c=>c.value)});closeModal();showToast('Session updated!')}catch(e){showToast('Failed.','error')}}

function openThreadModal(){if(!CU)return;closeModal();const o=document.createElement('div');o.className='modal-overlay';o.onclick=e=>{if(e.target===o)closeModal()};
  o.innerHTML=`<div class="modal"><h2>New Discussion Post</h2>
    <div class="fg"><label>Title *</label><input id="th-title"><div class="err-text" id="err-th-title">Required</div></div>
    <div class="fg"><label>Body</label><textarea id="th-body" placeholder="Add details or your question..."></textarea></div>
    <div class="frow"><div class="fg"><label>Program</label><select id="th-prog" onchange="updCls('th-cls',this.value)">${PROGRAMS.map(p=>`<option value="${p.v}" ${p.v===UP?.program?'selected':''}>${p.l}</option>`).join('')}</select></div><div class="fg"><label>Class</label><select id="th-cls"></select></div></div>
    <div class="form-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="doThread()">Post</button></div></div>`;
  document.body.appendChild(o);updCls('th-cls',UP?.program||'demsn')}

async function doThread(){const title=document.getElementById('th-title').value.trim();if(!title){document.getElementById('th-title').classList.add('field-err');document.getElementById('err-th-title').classList.add('show');return}
  try{await db.collection('threads').add({title,body:document.getElementById('th-body').value.trim(),program:document.getElementById('th-prog').value,classType:document.getElementById('th-cls').value,author:CU.displayName||CU.email,authorUid:CU.uid,votes:0,votedBy:[],ts:new Date().toISOString(),replies:[]});closeModal();showToast('Post created!')}catch(e){showToast('Failed.','error')}}

function openUploadModal(){if(!CU)return;closeModal();const o=document.createElement('div');o.className='modal-overlay';o.onclick=e=>{if(e.target===o)closeModal()};
  o.innerHTML=`<div class="modal"><h2>Upload Study Material</h2>
    <div class="fg"><label>File</label><input type="file" id="up-file" style="padding:8px"></div>
    <div class="frow"><div class="fg"><label>Program</label><select id="up-prog" onchange="updCls('up-cls',this.value)">${PROGRAMS.map(p=>`<option value="${p.v}" ${p.v===UP?.program?'selected':''}>${p.l}</option>`).join('')}</select></div><div class="fg"><label>Class</label><select id="up-cls"></select></div></div>
    <div class="form-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="up-btn" onclick="doUpload()">Upload</button></div></div>`;
  document.body.appendChild(o);updCls('up-cls',UP?.program||'demsn')}

async function doUpload(){
  const f=document.getElementById('up-file')?.files?.[0];if(!f){showToast('Select a file.','error');return}
  const btn=document.getElementById('up-btn');if(btn){btn.textContent='Uploading...';btn.disabled=true}
  try{
    const path=`materials/${Date.now()}_${f.name}`;
    const ref=stg.ref(path);await ref.put(f);const url=await ref.getDownloadURL();
    await db.collection('materials').add({fileName:f.name,url,storagePath:path,program:document.getElementById('up-prog').value,classType:document.getElementById('up-cls').value,uploadedBy:CU.displayName||CU.email,uid:CU.uid,uploadedAt:new Date().toISOString()});
    closeModal();showToast('Material uploaded!');
  }catch(e){showToast('Upload failed.','error');console.error(e);if(btn){btn.textContent='Upload';btn.disabled=false}}}

// Auto-clear field errors
document.addEventListener('input',e=>{if(e.target.classList.contains('field-err')){e.target.classList.remove('field-err');const err=e.target.parentElement?.querySelector('.err-text');if(err)err.classList.remove('show')}});
</script>
</body>
</html>
